apiVersion: v1
kind: Pod
metadata:
  name: multi-volume-demo
spec:
  containers:
  - name: app
    image: nginx:alpine
    volumeMounts:
    - name: cache-vol
      mountPath: /tmp/cache
    - name: data-vol
      mountPath: /data
    - name: config-vol
      mountPath: /etc/config

  volumes:
  - name: cache-vol
    emptyDir:
      medium: Memory

  - name: data-vol
    persistentVolumeClaim:
      claimName: app-pvc

  - name: config-vol
    configMap:
      name: app-config