apiVersion: v1
kind: Pod
metadata:
  name: hostpath-demo
spec:
  containers:
  - name: nginx
    image: nginx:alpine
    ports:
    - containerPort: 80
    volumeMounts:
    - name: webdata
      mountPath: /usr/share/nginx/html

  volumes:
  - name: webdata
    hostPath:
      path: /tmp/webdata
      type: DirectoryOrCreate